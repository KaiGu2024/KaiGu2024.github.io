<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading Orwell on Moscow — Reading Group</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --navy: #1a1a1a; --accent: #c96442; --muted: #7a706b; --border: #e6ddd6; --bg: #faf7f4; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--navy); }
    header { border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; gap: 1.5rem; }
    header a { font-size: 0.75rem; color: var(--muted); text-decoration: none; letter-spacing: 0.05em; }
    header a:hover { color: var(--accent); }
    header span { font-size: 0.75rem; color: var(--border); }
    h1 { font-size: 0.95rem; font-weight: 600; }
    .toolbar { padding: 0.75rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .toolbar p { font-size: 0.78rem; color: var(--muted); }
    .download { font-size: 0.75rem; font-weight: 500; color: var(--navy); background: var(--border); padding: 0.35rem 0.9rem; border-radius: 3px; text-decoration: none; }
    .download:hover { background: var(--accent); color: #fff; }
    iframe { display: block; width: 100%; height: calc(100vh - 100px); border: none; }
  </style>
</head>
<body>
  <header>
    <a href="../">← Reading Group</a>
    <span>/</span>
    <h1>Reading Orwell on Moscow</h1>
  </header>
  <div class="toolbar">
    <p></p>
    <a class="download" href="1031_Reading_Orwell_on_Moscow.pdf" download>Download PDF</a>
  </div>
  <iframe src="1031_Reading_Orwell_on_Moscow.pdf" title="Reading Orwell on Moscow"></iframe>
</body>
</html>
