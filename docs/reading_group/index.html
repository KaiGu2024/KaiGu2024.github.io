<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading Group — Kai Gu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --navy: #1a1a1a; --accent: #c96442; --accent-hover: #a8502f; --muted: #7a706b; --border: #e6ddd6; --bg: #faf7f4; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--navy); line-height: 1.6; }
    header { border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; gap: 1.5rem; }
    header a { font-size: 0.75rem; color: var(--muted); text-decoration: none; letter-spacing: 0.05em; }
    header a:hover { color: var(--accent); }
    header span { font-size: 0.75rem; color: var(--border); }
    header h1 { font-size: 0.95rem; font-weight: 600; }
    main { max-width: 720px; margin: 0 auto; padding: 3rem 2rem; }
    h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 1.5rem; }
    .list { list-style: none; }
    .list li { border-bottom: 1px solid var(--border); }
    .list li:first-child { border-top: 1px solid var(--border); }
    .list a {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 0;
      text-decoration: none; color: var(--navy);
      font-size: 0.92rem;
      transition: color 0.15s;
    }
    .list a:hover { color: var(--accent); }
    .list a span { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .list a:hover span { color: var(--accent); }
  </style>
</head>
